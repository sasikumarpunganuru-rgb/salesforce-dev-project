<template>
    <lightning-input
        label="Search Account"
        value={searchKey}
        onchange={handleSearchInput}
        placeholder="Type at least 3 letters..."
    ></lightning-input>

    <template if:true={showList}>
        <div class="dropdown">
            <template for:each={accounts} for:item="acc">
                <div 
                    key={acc.Id}
                    class="dropdown-item"
                    data-id={acc.Id}
                    data-name={acc.Name}
                    onclick={handleAccountSelect}
                >
                    {acc.Name}
                </div>
            </template>
        </div>
    </template>
</template>
