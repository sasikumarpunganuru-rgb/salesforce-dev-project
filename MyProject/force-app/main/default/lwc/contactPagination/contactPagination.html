<template>
    <lightning-card title="Contact List With Search & Pagination">
        <div class="slds-p-around_medium">
            <lightning-input type="search" label="Search by Name" value={searchKey} onchange={handleSearch}></lightning-input>

            <template if:true={contacts}>
                <p>Total Contacts Found: {totalContacts}</p>
                <lightning-datatable
                    key-field="Id"
                    data={contacts}
                    columns={columns}>
                </lightning-datatable>
                
                <div class="slds-m-top_medium">
                    <lightning-button label="Previous" onclick={handlePrevious} disabled={isPrevDisabled}></lightning-button>
                    <lightning-button label="Next" onclick={handleNext} class="slds-m-left_small" disabled={isNextDisabled}></lightning-button>
                    <span class="slds-m-left_medium">Page {pageNumber}</span>
                </div>
            </template>

            <template if:true={error}>
                <p class="slds-text-color_error">{error}</p>
            </template>
        </div>
    </lightning-card>
</template>
