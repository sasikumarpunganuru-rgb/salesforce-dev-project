<template>
    <lightning-card>
        <h3 slot="title">
            <lightning-icon icon-name="Standard:account" size="small"></lightning-icon>
            Account creation using Apex Controller

        </h3>
        <div slot="footer">
            <lightning-button label="Create Account" onclick={handleSaveChanges} variant="brand"></lightning-button>
            <lightning-badge label={accountId}></lightning-badge>
            <lightning-badge label={error}></lightning-badge>
        </div>
        <p class="slds-p-horizontal_small">
            <lightning-input type="text" label="Account Name" value={accountRecord.Name} onchange={handleChangeName}></lightning-input>
            <lightning-input type="text" label="Type" value={accountRecord.Type} onchange={handleChangeType}></lightning-input>
            <lightning-input type="text" label="Phone" value={accountRecord.Phone} onchange={handleChangePhone}></lightning-input>
        </p>
    </lightning-card>
    
</template>
