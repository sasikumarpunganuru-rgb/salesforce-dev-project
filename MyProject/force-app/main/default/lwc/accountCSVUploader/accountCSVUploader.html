<template>
    <lightning-card title="Upload Accounts CSV">
        <div class="slds-p-around_medium">
            <lightning-input type="file" label="Select CSV File" accept=".csv" onchange={handleFileChange}></lightning-input>

            <template if:true={fileName}>
                <p class="slds-m-top_small">📄 Selected file: <strong>{fileName}</strong></p>
            </template>

            <lightning-button variant="brand" label="Upload" onclick={handleUpload} class="slds-m-top_medium"></lightning-button>
        </div>
    </lightning-card>
</template>
